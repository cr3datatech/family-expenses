<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Receipt body -->
  <rect x="4" y="1" width="24" height="28" rx="2" ry="2" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <!-- Zigzag tear at bottom -->
  <polyline points="4,29 7,26 10,29 13,26 16,29 19,26 22,29 25,26 28,29" fill="none" stroke="#374151" stroke-width="2" stroke-linejoin="round"/>
  <!-- Text lines -->
  <line x1="8" y1="8" x2="24" y2="8" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="13" x2="24" y2="13" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="18" x2="18" y2="18" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Total line (bolder) -->
  <line x1="8" y1="23" x2="24" y2="23" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
</svg>
