<style>
* { box-sizing: border-box; }
:root {
  --bg: #0a0a0b;
  --card: #131316;
  --card-2: #1a1a1f;
  --card-3: #20202a;
  --border: #26262d;
  --border-strong: #3a3a44;
  --text: #ededf0;
  --text-2: #9a9aa6;
  --text-3: #5c5c66;
  --accent: #f97316;
  --accent-2: #fb923c;
  --accent-soft: rgba(249, 115, 22, 0.12);
  --green: #4ade80;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #c084fc;
}
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.app { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }
header {
  display: flex; justify-content: space-between; align-items: end;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
.subtitle { color: var(--text-2); font-size: 14px; }
.header-row {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
}
.tabs {
  display: flex; gap: 4px;
  background: var(--card); padding: 4px;
  border-radius: 12px; border: 1px solid var(--border);
  width: fit-content;
}
.search-btn {
  background: var(--accent); color: white;
  border: none; border-radius: 10px;
  padding: 11px 18px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: background 0.15s ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.search-btn::before { content: "🔎"; font-size: 12px; }
.search-btn:hover { background: var(--accent-2); }
@media (max-width: 640px) {
  .header-row { width: 100%; }
  .tabs { width: 100%; flex: 1; }
  .search-btn { width: 100%; padding: 10px; }
}
.tab {
  padding: 10px 22px; border-radius: 8px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; user-select: none;
  color: var(--text-2);
  transition: all 0.15s ease;
  background: transparent; border: none;
  font-family: inherit;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--card-2);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.tab .count {
  margin-left: 8px;
  font-size: 11px; color: var(--text-3);
  background: var(--bg); padding: 2px 8px; border-radius: 999px;
}
.tab.active .count { color: var(--accent); }
.filter-chip {
  display: none;
  align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--accent-soft);
  border: 1px solid rgba(249, 115, 22, 0.25);
  border-radius: 999px;
  font-size: 12px; color: var(--accent-2);
  margin-bottom: 16px; width: fit-content;
}
.filter-chip.active { display: inline-flex; }
.filter-chip button {
  background: transparent; border: none; color: var(--accent-2);
  cursor: pointer; padding: 0 0 0 4px; font-size: 14px;
  font-family: inherit;
}
.notice {
  background: rgba(249, 115, 22, 0.08);
  border: 1px solid rgba(249, 115, 22, 0.2);
  color: var(--accent-2);
  padding: 12px 16px; border-radius: 10px;
  font-size: 13px;
  margin-bottom: 20px;
}
.grid { display: grid; gap: 16px; }
.grid-stats { grid-template-columns: repeat(4, 1fr); }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 2fr 1fr; }
@media (max-width: 900px) {
  .grid-stats { grid-template-columns: repeat(2, 1fr); }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .app { padding: 16px 12px 60px; }
  h1 { font-size: 24px; }
  header { flex-direction: column; align-items: flex-start; gap: 4px; margin-bottom: 18px; }
  header > div:last-child { font-size: 10px; }
  .tabs { width: 100%; padding: 3px; }
  .tab { flex: 1; text-align: center; padding: 9px 8px; font-size: 13px; }
  .tab .count { display: none; }
  .stat-value { font-size: 20px; }
  .card { padding: 14px; border-radius: 12px; }
  .card h3 { font-size: 11px; }
  .canvas-wrap { height: 240px; }
  .calendar { gap: 3px; }
  .cal-cell { padding: 4px; aspect-ratio: 1 / 1; }
  .cal-day { font-size: 10px; }
  .cal-amt { font-size: 10px; }
  .cal-head { font-size: 9px; padding: 4px 0; }
  table { font-size: 12px; }
  th, td { padding: 8px 6px; }
  /* horizontal scroll for transaction table on mobile */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -14px; padding: 0 14px; }
  .search { width: 100%; }
  .section-title { flex-direction: column; align-items: flex-start; gap: 8px; }
  .click-hint { display: none; }
  .modal-overlay { padding: 16px 8px; }
  .modal { max-height: 92vh; border-radius: 14px; }
  .modal-head { padding: 14px 16px; }
  .modal-stats { padding: 10px 16px; gap: 14px; flex-wrap: wrap; }
  .modal-stat .v { font-size: 16px; }
  .modal-body { padding: 12px 16px; }
  .bar-label { width: 100px; font-size: 12px; }
  .bar-val { width: 70px; font-size: 12px; }
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  position: relative;
}
.card h3 {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-3); margin: 0 0 14px; font-weight: 600;
}
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.stat-sub { color: var(--text-2); font-size: 12px; margin-top: 4px; }
.section { margin-top: 28px; }
.section-title {
  font-size: 18px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
canvas { max-width: 100%; }
.canvas-wrap { position: relative; height: 320px; cursor: pointer; }
.calendar {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.cal-head {
  font-size: 11px; color: var(--text-3); text-align: center;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 6px 0;
}
.cal-cell {
  aspect-ratio: 1.1 / 1;
  border-radius: 8px;
  padding: 8px;
  background: var(--card-2);
  display: flex; flex-direction: column; justify-content: space-between;
  font-size: 11px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 0.1s ease, border-color 0.1s ease;
  user-select: none;
}
.cal-cell.empty { background: transparent; border: none; cursor: default; }
.cal-cell:hover:not(.empty) { transform: translateY(-1px); border-color: var(--border-strong); }
.cal-cell.selected:not(.empty) { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.cal-cell.dim:not(.empty) { opacity: 0.4; }
.cal-day { font-weight: 600; color: var(--text-2); }
.cal-amt { font-weight: 600; font-size: 13px; }
.cal-cell.heavy .cal-day, .cal-cell.heavy .cal-amt { color: white; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; font-weight: 500;
     color: var(--text-3); font-size: 11px; text-transform: uppercase;
     letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
     cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--text); }
th.sortable .sort-arrow { display: inline-block; margin-left: 4px; opacity: 0.4; }
th.sortable.active .sort-arrow { opacity: 1; color: var(--accent); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--card-2); }
tr.clickable { cursor: pointer; }
td.right, th.right { text-align: right; }
td.num { font-variant-numeric: tabular-nums; }
.tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 999px; font-size: 11px; font-weight: 500;
  background: var(--card-2); color: var(--text-2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.1s ease;
}
.tag:hover { border-color: var(--border-strong); color: var(--text); }
.tag-biz { background: rgba(96, 165, 250, 0.12); color: var(--blue); border-color: rgba(96, 165, 250, 0.25); }
.tag-travel { background: rgba(192, 132, 252, 0.12); color: var(--purple); border-color: rgba(192, 132, 252, 0.25); }
.search {
  width: 240px;
  background: var(--card-2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 8px;
  font-size: 13px; font-family: inherit;
}
.search:focus { outline: none; border-color: var(--accent); }
.bar-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s ease;
  border-radius: 4px; margin: 0 -8px;
  padding-left: 8px; padding-right: 8px;
}
.bar-row:last-child { border-bottom: none; }
.bar-row:hover { background: var(--card-2); }
.bar-label { width: 140px; font-size: 13px; color: var(--text); }
.bar-track { flex: 1; height: 8px; background: var(--card-2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 4px; }
.bar-val { width: 90px; text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; color: var(--text-2); }
.footer { color: var(--text-3); font-size: 11px; margin-top: 40px; text-align: center; }
.muted { color: var(--text-3); font-size: 12px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  align-items: flex-start; justify-content: center;
  padding: 16px 12px;
  z-index: 100;
  overflow-y: auto;
}
@media (min-width: 720px) {
  .modal-overlay { padding: 60px 20px; }
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 720px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 18px; font-weight: 600; }
.modal-sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
.modal-close {
  background: transparent; border: none; color: var(--text-2);
  cursor: pointer; font-size: 20px; padding: 4px 8px;
  border-radius: 6px; transition: all 0.1s ease;
  font-family: inherit;
}
.modal-close:hover { color: var(--text); background: var(--card-2); }
.modal-body { padding: 16px 20px; overflow-y: auto; overflow-x: hidden; min-width: 0; }
.modal-body * { max-width: 100%; }
.modal-body table { table-layout: fixed; width: 100%; }
.modal-body td, .modal-body th { word-break: break-word; overflow-wrap: anywhere; }
.modal-body td.right, .modal-body th.right { white-space: nowrap; width: 1%; }
@media (max-width: 480px) {
  .modal-body { padding: 14px 14px; }
}

.tx-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.tx-row:last-child { border-bottom: none; }
.tx-row-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.tx-row-left { min-width: 0; flex: 1; overflow-wrap: anywhere; }
.tx-row-left > div:first-child { line-height: 1.35; }
.tx-row-sub { font-size: 11px; margin-top: 2px; overflow-wrap: anywhere; }
.tx-row-amt { white-space: nowrap; flex-shrink: 0; }
.tx-items { margin-top: 6px; font-size: 12px; }
.tx-item {
  display: flex; gap: 8px;
  padding: 3px 8px;
  align-items: baseline;
}
.tx-item-name { flex: 1; min-width: 0; color: var(--text-2); overflow-wrap: anywhere; }
.tx-item-amt { white-space: nowrap; flex-shrink: 0; color: var(--text-2); }
.modal-stats {
  display: flex; gap: 24px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--card-2);
}
.modal-stat { display: flex; flex-direction: column; }
.modal-stat .v { font-size: 20px; font-weight: 700; }
.modal-stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.click-hint {
  display: inline-block;
  font-size: 10px; color: var(--text-3);
  margin-left: 8px; padding: 1px 6px;
  border: 1px solid var(--border); border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
</style>

                 "#22d3ee", "#f472b6", "#a3e635", "#fb7185", "#94a3b8",

let state = {
  tab: "everything",
  sortKey: "date",
  sortDir: "desc",
};

const fmt = n => "€" + (n || 0).toLocaleString("en-GB", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtRound = n => "€" + Math.round(n || 0).toLocaleString("en-GB");
const escapeHtml = s => String(s == null ? "" : s)
  .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
const escapeAttr = s => escapeHtml(s);

function deriveCategory(e) {
  if (e.is_business) return "Business";
  return e.category || "Other";
}

function displayMerchant(e) {
  if ((e.merchant || "").toLowerCase().includes("ealt alsina")) {
    return "Gym (Ealt Alsina Granada)";
  }
  return e.merchant || "";
}

function isQuarterlySanitas(e) {
  return (e.merchant || "").toLowerCase().includes("sanitas") && e.total >= 100;
}

function applyTabFilter(rows, tab) {
  return rows.filter(e => {
    if (tab === "everything") return true;
    if (tab === "business") return !!e.is_business;
    if (tab === "daily") {
      if (e.is_business) return false;
      if ((e.category || "") === "Travel") return false;
      if (isQuarterlySanitas(e)) return false;
      return true;
    }
  });
}

// ---------- Popup builders for filterable views ----------

function txListHtml(rows) {
  return rows.slice().sort((a,b) => b.date.localeCompare(a.date)).map(e => {
    const note = e.note ? ` <span class="muted">(${escapeHtml(e.note)})</span>` : "";
    let itemHtml = "";
    if (e.items && e.items.length > 0) {
      itemHtml = `<div class="tx-items">${e.items.map(it => `
        <div class="tx-item">
          <div class="tx-item-name">${escapeHtml(it.name || "")}</div>
          <div class="tx-item-amt num">${fmt(it.amount || 0)}</div>
        </div>`).join("")}</div>`;
    }
    return `<div class="tx-row">
      <div class="tx-row-head">
        <div class="tx-row-left">
          <div><strong>${escapeHtml(displayMerchant(e))}</strong>${note}</div>
          <div class="muted tx-row-sub">${e.date.slice(0,10)} · ${escapeHtml(deriveCategory(e))} · ${escapeHtml(e.card || "")}</div>
        </div>
        <div class="tx-row-amt num"><strong>${fmt(e.total)}</strong></div>
      </div>
      ${itemHtml}
    </div>`;
  }).join("");
}

function showDayDetails(day) {
  const tabRows = applyTabFilter(DATA.expenses, state.tab);
  const matches = tabRows.filter(e => parseInt(e.date.slice(8,10), 10) === day);
  if (matches.length === 0) return;
  const total = matches.reduce((s,e) => s + e.total, 0);
  const dt = new Date(DATA.year, DATA.month - 1, day);
  const wd = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][dt.getDay()];
  const stats = `
    <div class="modal-stat"><div class="v">${fmt(total)}</div><div class="l">Total spent</div></div>
    <div class="modal-stat"><div class="v">${matches.length}</div><div class="l">Transactions</div></div>
    <div class="modal-stat"><div class="v">${fmt(total/matches.length)}</div><div class="l">Avg / txn</div></div>
  `;
  openModal({
    title: `${wd}, ${DATA.month_name} ${day}`,
    sub: "All transactions on this day",
    statsHtml: stats,
    bodyHtml: txListHtml(matches),
  });
}

function showCategoryDetails(cat) {
  const tabRows = applyTabFilter(DATA.expenses, state.tab);
  const matches = tabRows.filter(e => deriveCategory(e) === cat);
  if (matches.length === 0) return;
  const total = matches.reduce((s,e) => s + e.total, 0);
  const stats = `
    <div class="modal-stat"><div class="v">${fmt(total)}</div><div class="l">${escapeHtml(cat)}</div></div>
    <div class="modal-stat"><div class="v">${matches.length}</div><div class="l">Transactions</div></div>
    <div class="modal-stat"><div class="v">${fmt(total/matches.length)}</div><div class="l">Avg / txn</div></div>
  `;
  openModal({
    title: cat,
    sub: "All transactions in this category",
    statsHtml: stats,
    bodyHtml: txListHtml(matches),
  });
}

function showCardDetails(card) {
  const tabRows = applyTabFilter(DATA.expenses, state.tab);
  const matches = tabRows.filter(e => (e.card || "Unknown") === card);
  if (matches.length === 0) return;
  const total = matches.reduce((s,e) => s + e.total, 0);
  // by-category breakdown
  const byCat = {};
  matches.forEach(e => {
    const c = deriveCategory(e);
    byCat[c] = (byCat[c] || 0) + e.total;
  });
  const sortedCats = Object.entries(byCat).sort((a,b) => b[1] - a[1]);
  const stats = `
    <div class="modal-stat"><div class="v">${fmt(total)}</div><div class="l">${escapeHtml(card)}</div></div>
    <div class="modal-stat"><div class="v">${matches.length}</div><div class="l">Transactions</div></div>
    <div class="modal-stat"><div class="v">${sortedCats.length}</div><div class="l">Categories</div></div>
  `;
  const catSummary = `<div style="padding:0 0 12px; border-bottom:1px solid var(--border); margin-bottom:12px;">
    <div class="muted" style="margin-bottom:6px;">By category:</div>
    ${sortedCats.map(([c,v]) => `
      <div style="display:flex; justify-content:space-between; padding:3px 0; font-size:13px;">
        <span>${escapeHtml(c)}</span><span class="num">${fmt(v)}</span>
      </div>`).join("")}
  </div>`;
  openModal({
    title: card,
    sub: "Card detail",
    statsHtml: stats,
    bodyHtml: catSummary + txListHtml(matches),
  });
}

// ---------- Item search modal ----------

function openItemSearch() {
  const body = `
    <input id="itemSearchInput" class="search" style="width:100%; margin-bottom:12px;"
           placeholder="Type to search… e.g. coca cola, blueberries, cerveza, pollo">
    <div id="itemSearchResults" class="muted" style="text-align:center; padding:24px;">
      Start typing to search across all line items in this month.
    </div>
  `;
  openModal({
    title: "Search items",
    sub: `${ITEMS_INDEX.length} line items across all itemised receipts this month`,
    statsHtml: "",
    bodyHtml: body,
  });
  const input = document.getElementById("itemSearchInput");
  input.focus();
  input.addEventListener("input", () => renderItemSearchResults(input.value));
}

function renderItemSearchResults(query) {
  const wrap = document.getElementById("itemSearchResults");
  const q = query.trim().toLowerCase();
  if (q.length < 2) {
    wrap.style.textAlign = "center";
    wrap.style.padding = "24px";
    wrap.innerHTML = `<span class="muted">Type at least 2 characters to search.</span>`;
    return;
  }

  // Search 1: line items
  const itemMatches = ITEMS_INDEX.filter(it =>
    it.name.toLowerCase().includes(q) || it.canonical.toLowerCase().includes(q)
  );

  // Search 2: receipts by merchant / note / category
  const receiptMatches = DATA.expenses.filter(e => {
    const m = (e.merchant || "").toLowerCase();
    const n = (e.note || "").toLowerCase();
    const c = (e.category || "").toLowerCase();
    return m.includes(q) || n.includes(q) || c.includes(q);
  });

  if (itemMatches.length === 0 && receiptMatches.length === 0) {
    wrap.innerHTML = `<span class="muted">No matches.</span>`;
    wrap.style.textAlign = "center";
    wrap.style.padding = "24px";
    return;
  }

  wrap.style.textAlign = "left";
  wrap.style.padding = "0";

  let html = "";

  // Receipt-level matches first (more useful when item-level has nothing)
  if (receiptMatches.length > 0) {
    const total = receiptMatches.reduce((s,e) => s + e.total, 0);
    // Group by merchant
    const byMerch = {};
    receiptMatches.forEach(e => {
      const m = displayMerchant(e);
      if (!byMerch[m]) byMerch[m] = {total: 0, count: 0, cat: deriveCategory(e), occurrences: []};
      byMerch[m].total += e.total;
      byMerch[m].count++;
      byMerch[m].occurrences.push(e);
    });
    const sortedMerch = Object.entries(byMerch).sort((a,b) => b[1].total - a[1].total);

    html += `
      <div style="padding:8px 0 8px; color:var(--text); font-size:13px;">
        <strong>${fmt(total)}</strong> across <strong>${receiptMatches.length}</strong> receipts (whole-receipt match)
      </div>
      ${sortedMerch.map(([m,v]) => `
        <div class="tx-row">
          <div class="tx-row-head">
            <div class="tx-row-left">
              <div><strong>${escapeHtml(m)}</strong></div>
              <div class="muted tx-row-sub">
                ${escapeHtml(v.cat)} · ${v.occurrences.slice(0,3).map(o => o.date.slice(0,10)).join(", ")}${v.occurrences.length > 3 ? ` · +${v.occurrences.length-3}` : ""}
              </div>
            </div>
            <div class="tx-row-amt num">
              <strong>${fmt(v.total)}</strong>
              <div class="muted" style="font-size:11px; text-align:right; font-weight:normal;">${v.count} ${v.count === 1 ? "visit" : "visits"}</div>
            </div>
          </div>
        </div>
      `).join("")}
    `;
  }

  // Line-item matches
  if (itemMatches.length > 0) {
    const grandTotal = itemMatches.reduce((s,m) => s + m.amount, 0);
    const agg = {};
    itemMatches.forEach(it => {
      const key = it.name.toLowerCase().trim();
      if (!agg[key]) agg[key] = {display: it.name, total: 0, count: 0, occurrences: []};
      agg[key].total += it.amount;
      agg[key].count++;
      agg[key].occurrences.push(it);
    });
    const sorted = Object.values(agg).sort((a,b) => b.total - a.total);

    html += `
      <div style="padding:18px 0 8px; color:var(--text); font-size:13px;">
        <strong>${fmt(grandTotal)}</strong> across <strong>${itemMatches.length}</strong> line items in <strong>${sorted.length}</strong> unique products
      </div>
      ${sorted.map(g => `
        <div class="tx-row">
          <div class="tx-row-head">
            <div class="tx-row-left">
              <div><strong>${escapeHtml(g.display)}</strong></div>
              <div class="muted tx-row-sub">
                ${g.occurrences.map(o => `${escapeHtml(o.merchant)} ${o.date}`).slice(0, 3).join(" · ")}${g.occurrences.length > 3 ? ` · +${g.occurrences.length-3}` : ""}
              </div>
            </div>
            <div class="tx-row-amt num">
              <strong>${fmt(g.total)}</strong>
              <div class="muted" style="font-size:11px; text-align:right; font-weight:normal;">${g.count}×</div>
            </div>
          </div>
        </div>
      `).join("")}
    `;
  }

  wrap.innerHTML = html;
}

function groupBy(arr, keyFn, valFn) {
  const m = {};
  arr.forEach(x => {
    const k = keyFn(x);
    m[k] = (m[k] || 0) + valFn(x);
  });
  return m;
}

// ---------- Modal ----------

function openModal({title, sub, statsHtml, bodyHtml}) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalSub").textContent = sub || "";
  document.getElementById("modalStats").innerHTML = statsHtml || "";
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modal").classList.add("open");
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
}
window.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// Drill into a merchant: show all visits + their line items.
function showMerchant(merchantDisplayName) {
  const tabRows = applyTabFilter(DATA.expenses, state.tab);
  const matches = tabRows.filter(e => displayMerchant(e) === merchantDisplayName);
  const total = matches.reduce((s,e) => s + e.total, 0);
  const visits = matches.length;
  const cats = [...new Set(matches.map(deriveCategory))].join(", ");

  const stats = `
    <div class="modal-stat"><div class="v">${fmt(total)}</div><div class="l">Total spent</div></div>
    <div class="modal-stat"><div class="v">${visits}</div><div class="l">Visits</div></div>
    <div class="modal-stat"><div class="v">${fmt(total/visits)}</div><div class="l">Avg / visit</div></div>
  `;

  const visitRows = matches.slice().sort((a,b) => b.date.localeCompare(a.date)).map(e => {
    const note = e.note ? ` <span class="muted">(${e.note})</span>` : "";
    let itemHtml = "";
    if (e.items && e.items.length > 0) {
      itemHtml = `<table style="margin-top:8px; font-size:12px;">
        ${e.items.map(it => `<tr>
          <td style="padding:4px 8px; color:var(--text-2);">${it.name || ""}</td>
          <td class="right num" style="padding:4px 8px;">${fmt(it.amount || 0)}</td>
        </tr>`).join("")}
      </table>`;
    }
    return `<div style="padding:12px 0; border-bottom:1px solid var(--border);">
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <div><strong>${e.date.slice(0,10)}</strong>${note} <span class="muted">· ${deriveCategory(e)}</span></div>
        <div class="num"><strong>${fmt(e.total)}</strong></div>
      </div>
      ${itemHtml}
    </div>`;
  }).join("");

  openModal({
    title: merchantDisplayName,
    sub: cats,
    statsHtml: stats,
    bodyHtml: visitRows,
  });
}

  const sortedItems = Object.values(collapsed).sort((a,b) => b.total - a.total);

// Drill into alcoholic vs non-alcoholic
function showDrinks(kind) {
  const items = (kind === "alcohol" ? FOOD.drinks.alcohol_items : FOOD.drinks.non_alcohol_items)
    .slice().sort((a,b) => b.amount - a.amount);
  const total = items.reduce((s,i) => s + i.amount, 0);

  // Collapse by name
  const collapsed = {};
  items.forEach(it => {
    const key = it.name.toLowerCase().trim();
    if (!collapsed[key]) collapsed[key] = {display: it.name, count: 0, total: 0, locations: new Set()};
    collapsed[key].count++;

    </thead>
    <tbody>
      ${sorted.map(i => `<tr>

// ---------- Calendar ----------

function buildCalendar(rows) {
  const byDay = {};
  rows.forEach(e => {
    const d = parseInt(e.date.slice(8, 10), 10);
    byDay[d] = (byDay[d] || 0) + e.total;
  });
  const daysIn = DATA.days_in_month;
  const firstWeekday = (new Date(DATA.year, DATA.month - 1, 1).getDay() + 6) % 7;
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push({empty: true});
  for (let d = 1; d <= daysIn; d++) cells.push({day: d, amt: byDay[d] || 0});
  while (cells.length % 7) cells.push({empty: true});

  const max = Math.max(...Object.values(byDay), 1);
  const heads = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
    .map(h => `<div class="cal-head">${h}</div>`).join("");
  const cellHtml = cells.map(c => {
    if (c.empty) return `<div class="cal-cell empty"></div>`;
    const intensity = c.amt / max;
    const heavy = intensity > 0.55;
    const bg = c.amt > 0
      ? `background: rgba(249, 115, 22, ${0.08 + intensity * 0.78});`
      : "";
    let cls = "cal-cell";
    if (heavy) cls += " heavy";
    return `<div class="${cls}" style="${bg}" data-action="day" data-value="${c.day}">
      <div class="cal-day">${c.day}</div>
      ${c.amt > 0 ? `<div class="cal-amt">${fmtRound(c.amt)}</div>` : ""}
    </div>`;
  }).join("");
  return `<div class="calendar">${heads}${cellHtml}</div>`;
}

function topMerchants(rows, n=10) {
  const m = {};
  rows.forEach(e => {
    const k = displayMerchant(e);
    if (!m[k]) m[k] = {total: 0, count: 0, cat: deriveCategory(e)};
    m[k].total += e.total;
    m[k].count++;
  });
  return Object.entries(m).sort((a,b) => b[1].total - a[1].total).slice(0, n);
}

  }

  const search = document.getElementById("txSearch");
  if (search) {
    search.addEventListener("input", () => {
      const q = search.value.toLowerCase();
      document.querySelectorAll("#txBody tr").forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? "" : "none";
      });
    });
  }
}

function renderTransactionRows(rows) {
  const sorted = rows.slice().sort((a,b) => {
    const k = state.sortKey;
    let av, bv;
    if (k === "date") { av = a.date; bv = b.date; }
    else if (k === "merchant") { av = displayMerchant(a).toLowerCase(); bv = displayMerchant(b).toLowerCase(); }
    else if (k === "category") { av = deriveCategory(a); bv = deriveCategory(b); }
    else if (k === "card") { av = a.card || ""; bv = b.card || ""; }
    else if (k === "total") { av = a.total; bv = b.total; }
    if (av < bv) return state.sortDir === "asc" ? -1 : 1;
    if (av > bv) return state.sortDir === "asc" ? 1 : -1;
    return 0;
  });
  const body = document.getElementById("txBody");
  if (!body) return;
  body.innerHTML = sorted.map(e => {
    const cat = deriveCategory(e);
    let tagCls = "tag";
    if (e.is_business) tagCls = "tag tag-biz";
    else if (e.category === "Travel") tagCls = "tag tag-travel";
    const merch = displayMerchant(e);
    const note = e.note ? ` <span class="muted">(${escapeHtml(e.note)})</span>` : "";
    return `<tr class="clickable" data-action="merchant" data-value="${escapeAttr(merch)}">
      <td class="num">${e.date.slice(0,10)}</td>
      <td>${escapeHtml(merch)}${note}</td>
      <td><span class="${tagCls}" data-action="category" data-value="${escapeAttr(cat)}">${escapeHtml(cat)}</span></td>
      <td>${escapeHtml(e.card || "")}</td>
      <td class="right num">${fmt(e.total)}</td>
    </tr>`;
  }).join("");

  // Update sort arrow indicators
  document.querySelectorAll("th.sortable").forEach(th => {
    const k = th.dataset.sort;
    const arrow = th.querySelector(".sort-arrow");
    if (k === state.sortKey) {
      th.classList.add("active");
      arrow.textContent = state.sortDir === "asc" ? "↑" : "↓";
    } else {
      th.classList.remove("active");
      arrow.textContent = "";
    }
  });
}

function attachSortHandlers(rows) {
  document.querySelectorAll("th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.sort;
      if (state.sortKey === k) {
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = k;
        state.sortDir = (k === "date" || k === "total") ? "desc" : "asc";
      }
      renderTransactionRows(rows);
    });
  });
}

// ---------- Tab counts ----------

document.getElementById("count-everything").textContent = applyTabFilter(DATA.expenses, "everything").length;
document.getElementById("count-business").textContent = applyTabFilter(DATA.expenses, "business").length;
document.getElementById("count-daily").textContent = applyTabFilter(DATA.expenses, "daily").length;

// ---------- Tab switching ----------

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.tab = btn.dataset.tab;
    renderTab();
  });
});

// Delegated click handler — every clickable element opens a popup
document.addEventListener("click", e => {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;
  const v = t.dataset.value;
  if (action === "merchant") showMerchant(v);
  else if (action === "category") {
    e.stopPropagation();
    showCategoryDetails(v);
  }
  else if (action === "card") showCardDetails(v);
  else if (action === "day") showDayDetails(parseInt(v, 10));
  else if (action === "search-items") openItemSearch();
});

renderTab();
</script>
